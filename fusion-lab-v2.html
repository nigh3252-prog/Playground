<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FUSION LAB — Full Bestiary</title>
<style>
  :root{ --ink:#1a1430; --paper:#f2e9d8; --hot:#ff5a3c; --sun:#ffc93c; --teal:#2ec4b6; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0e1626;font-family:"Avenir Next","Trebuchet MS",Verdana,sans-serif;}
  canvas{display:block;}
  #ui{position:fixed;inset:0;pointer-events:none;user-select:none;-webkit-user-select:none;}

  #plateCard{position:absolute;top:12px;left:12px;background:var(--paper);border:3px solid var(--ink);border-radius:6px;
    box-shadow:4px 4px 0 rgba(10,8,20,.55);padding:8px 14px 9px;max-width:min(420px,calc(100vw - 24px));}
  #serial{font-size:10px;letter-spacing:.22em;font-weight:700;color:var(--hot);}
  #mname{font-size:clamp(18px,4.4vw,28px);font-weight:800;color:var(--ink);line-height:1.02;text-transform:uppercase;}
  #mtag{font-size:11px;color:#5a5170;font-style:italic;margin-top:2px;}

  #recipe{position:absolute;left:12px;right:12px;top:calc(12px + 86px);display:flex;flex-direction:column;gap:5px;}
  .rrow{display:flex;gap:5px;align-items:center;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;pointer-events:auto;}
  .rrow::-webkit-scrollbar{display:none;}
  .rlab{flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:.2em;color:#cfe0f2;background:rgba(20,18,40,.6);padding:3px 6px;border-radius:4px;}
  .chip{flex:0 0 auto;pointer-events:auto;border:3px solid var(--ink);border-radius:6px;background:var(--paper);color:var(--ink);
    font-family:inherit;font-weight:800;font-size:10px;letter-spacing:.06em;padding:6px 8px;box-shadow:2px 2px 0 rgba(10,8,20,.55);cursor:pointer;}
  .chip.on{background:var(--teal);color:#fff;}
  .chip:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(10,8,20,.55);}

  #anims{position:absolute;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:7px;flex-wrap:wrap;padding:0 8px;}
  .abtn{pointer-events:auto;border:3px solid var(--ink);border-radius:6px;background:var(--paper);color:var(--ink);
    font-family:inherit;font-weight:800;font-size:11px;letter-spacing:.05em;padding:9px 11px;box-shadow:3px 3px 0 rgba(10,8,20,.55);cursor:pointer;text-transform:uppercase;}
  .abtn.on{background:var(--hot);color:#fff;}
  .abtn .src{display:block;font-size:8px;letter-spacing:.16em;color:#8a7f9e;font-weight:700;}
  .abtn.on .src{color:#ffd9ce;}
  .abtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(10,8,20,.55);}

  #hint{position:absolute;bottom:calc(70px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;color:#9fb3cf;font-size:10px;letter-spacing:.12em;text-transform:uppercase;opacity:.8;}
  #padDot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#44506a;margin-right:5px;vertical-align:1px;}
  #padDot.live{background:var(--teal);}
</style>
</head>
<body>
<div id="ui">
  <div id="plateCard">
    <div id="serial">FUSION 1·1</div>
    <div id="mname">LION GOD</div>
    <div id="mtag">pure strain</div>
  </div>
  <div id="recipe">
    <div class="rrow"><span class="rlab">BODY</span><span id="bodyChips" style="display:flex;gap:5px;"></span></div>
    <div class="rrow"><span class="rlab">HEAD</span><span id="headChips" style="display:flex;gap:5px;"></span></div>
  </div>
  <div id="hint"><span id="padDot"></span>pad: LB/RB body · dpad&#8597; head · A move · X/Y/LT/RT attacks · B idle</div>
  <div id="anims"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   FUSION LAB v2 — full ten-creature bestiary
   Recipe: first pick = BODY (chassis, gait, tail, palette slave)
           second pick = HEAD (face, jaw, fx, PALETTE SOURCE)
   The chassis is built FROM the head's palette, so every hybrid
   reads as one animal. Anims are pure channel writers.
   ============================================================ */

// ---------- boot ----------
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
(function(){ const c=document.createElement('canvas');c.width=4;c.height=256;const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,256);
  grd.addColorStop(0,'#7fd4e8');grd.addColorStop(.55,'#a8e4ee');grd.addColorStop(.551,'#cdeef2');grd.addColorStop(1,'#e9f6ef');
  g.fillStyle=grd;g.fillRect(0,0,4,256);scene.background=new THREE.CanvasTexture(c);})();
scene.fog=new THREE.Fog(0xcdeef2,34,90);
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,.1,300);
scene.add(new THREE.HemisphereLight(0xdff3ff,0x8a7a5a,.75));
const key=new THREE.DirectionalLight(0xfff2d8,1.05); key.position.set(9,16,7); key.castShadow=true;
key.shadow.mapSize.set(1024,1024);
key.shadow.camera.left=-16;key.shadow.camera.right=16;key.shadow.camera.top=16;key.shadow.camera.bottom=-16;key.shadow.camera.far=50;
scene.add(key);
const rim=new THREE.DirectionalLight(0x9fd8ff,.35); rim.position.set(-8,6,-10); scene.add(rim);
let groundTex;
(function(){ const c=document.createElement('canvas');c.width=c.height=256;const g=c.getContext('2d');
  g.fillStyle='#d8c08c';g.fillRect(0,0,256,256);g.fillStyle='#cbb27e';
  for(let y=0;y<8;y++)for(let x=0;x<8;x++)if((x+y)&1)g.fillRect(x*32,y*32,32,32);
  g.strokeStyle='rgba(90,70,40,.35)';g.lineWidth=3;
  for(let i=0;i<=8;i++){g.beginPath();g.moveTo(i*32,0);g.lineTo(i*32,256);g.stroke();g.beginPath();g.moveTo(0,i*32);g.lineTo(256,i*32);g.stroke();}
  groundTex=new THREE.CanvasTexture(c);groundTex.wrapS=groundTex.wrapT=THREE.RepeatWrapping;groundTex.repeat.set(24,24);
  const p=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshStandardMaterial({map:groundTex,roughness:1}));
  p.rotation.x=-Math.PI/2;p.receiveShadow=true;scene.add(p);})();
(function(){ const ring=new THREE.Mesh(new THREE.RingGeometry(7.6,8,64),new THREE.MeshBasicMaterial({color:0x8a5a3a,transparent:true,opacity:.35}));
  ring.rotation.x=-Math.PI/2;ring.position.y=.02;scene.add(ring);})();

// ---------- helpers ----------
function M(col,opts){return new THREE.MeshStandardMaterial(Object.assign({color:col,flatShading:true,roughness:.85,metalness:.05},opts||{}));}
function hash(n){return (Math.sin(n*127.1+311.7)*43758.5453)%1;}
function crumple(geo,amt,seed){seed=seed||0;const p=geo.attributes.position;
  for(let i=0;i<p.count;i++){const x=p.getX(i),y=p.getY(i),z=p.getZ(i);
    p.setXYZ(i,x+hash(x*3.1+y*7.7+z*5.3+seed)*amt,y+hash(x*9.2+y*2.4+z*6.8+seed+9)*amt,z+hash(x*4.7+y*8.1+z*3.9+seed+17)*amt);}
  geo.computeVertexNormals();return geo;}
function box(w,h,d,col,amt,seed){const g=new THREE.BoxGeometry(w,h,d);if(amt)crumple(g,amt,seed);
  const m=new THREE.Mesh(g,M(col));m.castShadow=true;return m;}
function ball(r,col,amt,seed,ws,hs){const g=new THREE.SphereGeometry(r,ws||8,hs||6);if(amt)crumple(g,amt,seed);
  const m=new THREE.Mesh(g,M(col));m.castShadow=true;return m;}
function cone(r,h,col,seg,amt,seed){const g=new THREE.ConeGeometry(r,h,seg||6);if(amt)crumple(g,amt,seed);
  const m=new THREE.Mesh(g,M(col));m.castShadow=true;return m;}
function cyl(r1,r2,h,col,seg,amt,seed){const g=new THREE.CylinderGeometry(r1,r2,h,seg||7);if(amt)crumple(g,amt,seed);
  const m=new THREE.Mesh(g,M(col));m.castShadow=true;return m;}
function chain(lens,rads,col,seed){const root=new THREE.Group();let parent=root;const joints=[];
  for(let i=0;i<lens.length;i++){const p=new THREE.Group();parent.add(p);if(i>0)p.position.y=-lens[i-1];
    const seg=cyl(rads[i]*.8,rads[i],lens[i],col,6,rads[i]*.18,seed+i*13);seg.position.y=-lens[i]/2;p.add(seg);
    joints.push(p);parent=p;}
  const tip=new THREE.Group();tip.position.y=-lens[lens.length-1];parent.add(tip);
  return {root,joints,tip};}
function eye(r){const g=new THREE.Group();const w=ball(r,0xf6f3ea,0,0,8,6);w.material.roughness=.4;g.add(w);
  const p=ball(r*.45,0x14121e,0,0,6,5);p.position.z=r*.72;g.add(p);return g;}
function glowMat(col,emi,int){return new THREE.MeshStandardMaterial({color:col,emissive:emi,emissiveIntensity:int,flatShading:true});}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const ez=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const ezo=t=>1-Math.pow(1-t,3);
const ezi=t=>t*t*t;
function asr(u,aEnd,sEnd){return {a:clamp(u/aEnd,0,1),s:clamp((u-aEnd)/(sEnd-aEnd),0,1),r:clamp((u-sEnd)/(1-sEnd),0,1)};}
let trauma=0; function shake(v){trauma=Math.min(1,trauma+v);}

/* ============================================================
   THE CONTRACT v2 — semantic channels, zeroed each frame.
   New since phase 1: wings.*, tool.* (Phoenix / Mother Courage
   hardware), and scale factors (liftScale / strideScale) so a
   Stilt Walker pounce leaps Stilt-sized and a croc pounce
   stays croc-sized.
   ============================================================ */
function CH(){ return {
  root:{ z:0, spin:0 },
  body:{ lift:0, pitch:0, roll:0, yaw:0, shiver:0 },
  head:{ yaw:0, pitch:0, roll:0, shiver:0 },
  jaw:{ open:0 },
  limbs:{ mv:0, spdMul:1, crouch:0, thrust:0, stabRaise:0, stabJab:0, splay:0 },
  spine:{ coil:0, ring:0, spdMul:1 },
  wings:{ spread:0, beat:0 },      // native on Phoenix; others translate
  tool:{ reach:0, grip:0, stow:0 },// native on Mother Courage; others translate
  fx:{ flare:0 },
};}

// Standard fallback view for legged chassis. Native hardware
// opts out of the corresponding translation (opt.tool/opt.wings=false).
function leggedView(ch,opt){
  opt=opt||{};
  const tf=opt.tool===false?0:1, wf=opt.wings===false?0:1;
  return {
    mv:ch.limbs.mv,
    spdMul:ch.limbs.spdMul*ch.spine.spdMul,
    crouch:clamp(ch.limbs.crouch+ch.spine.ring*.6+ch.tool.stow*.2*tf,0,1),
    thrust:ch.limbs.thrust,
    stabRaise:clamp(ch.limbs.stabRaise+ch.tool.reach*.7*tf+ch.wings.spread*.25*wf,0,1),
    stabJab:clamp(ch.limbs.stabJab+ch.tool.grip*.6*tf,0,1),
    splay:clamp(ch.limbs.splay+ch.wings.spread*.6*wf,0,1),
    yawWind:ch.spine.coil*.6,
    beat:ch.wings.beat*wf
  };
}
// Shared torso pose from channels; chassis adds its own gait offsets after.
function bodyPose(body,rest,ch,t,liftScale){
  body.position.y=rest+ch.body.lift*liftScale;
  body.rotation.x=ch.body.pitch;
  body.rotation.z=ch.body.roll+Math.sin(t*31)*ch.body.shiver;
  body.rotation.y=ch.body.yaw;
}

/* ============================================================
   CHASSIS MODULES — built from the HEAD's palette (pal).
   pal roles: a=primary hide, b=secondary, c=pale/bone,
              d=dark accents, g=glow/hot accent
   ============================================================ */

function lionChassis(pal){
  const group=new THREE.Group();
  const body=new THREE.Group(); body.position.y=2.5; group.add(body);
  const chest=ball(1.35,pal.a,.12,3,9,7); chest.scale.set(1.05,1.05,1.25); chest.position.z=.6; body.add(chest);
  const hind=ball(1.05,pal.b,.12,7,8,6); hind.scale.set(.95,.95,1.2); hind.position.set(0,-.1,-1.15); body.add(hind);
  const socket=new THREE.Group(); socket.position.set(0,1.05,1.95); body.add(socket);
  const legs=[];
  [[-.85,1.35,0],[.85,1.35,0],[-.75,-1.35,1],[.75,-1.35,1]].forEach((cfg,i)=>{
    const L=chain([1.15,1.05,.3],[.3-cfg[2]*.04,.2,.16],pal.b,i*37);
    L.root.position.set(cfg[0],-.7-cfg[2]*.2,cfg[1]); L.rear=!!cfg[2];
    const paw=box(.5,.22,.6,pal.c); paw.position.set(0,.08,.12); L.tip.add(paw);
    L.phase=[0,.5,.75,.25][i]; body.add(L.root); legs.push(L);
  });
  const tail=chain([.9,.8,.5],[.12,.09,.14],pal.a,99);
  tail.root.position.set(0,.5,-2); tail.root.rotation.x=2.2; body.add(tail.root);
  return { group, body, socket, restY:2.5, headScale:1, liftScale:1, strideScale:1,
    apply(ch,dt,t){
      const F=leggedView(ch);
      bodyPose(body,2.5,ch,t,this.liftScale);
      body.position.y+=Math.sin(t*1.6)*.05+F.mv*Math.abs(Math.sin(t*6))*.14+F.beat*Math.sin(t*14)*.08;
      body.rotation.x+=F.mv*Math.sin(t*12)*.02;
      body.rotation.z+=F.mv*Math.sin(t*6)*.03;
      body.rotation.y+=F.yawWind;
      legs.forEach(L=>{
        const ph=t*6*F.spdMul+L.phase*Math.PI*2;
        const swing=F.mv*Math.sin(ph)*.6, lift=F.mv*Math.max(0,Math.cos(ph));
        let hip=swing-lift*.4+(L.rear?.3:-.05);
        let knee=(L.rear?-1:1)*(lift*.9+.15);
        let ankle=(L.rear?1:-1)*(.15+lift*.4);
        if(L.rear){ hip=lerp(hip,.9,F.crouch); knee=lerp(knee,-1.6,F.crouch);
          hip=lerp(hip,-.9,F.thrust); knee=lerp(knee,.9,F.thrust); }
        else { hip=lerp(hip,.5,F.crouch); knee=lerp(knee,1.2,F.crouch);
          hip=lerp(hip,-1.3+F.stabJab*1.7,F.stabRaise);
          knee=lerp(knee,.3+F.stabJab*.6,F.stabRaise); }
        L.joints[0].rotation.x=hip; L.joints[1].rotation.x=knee; L.joints[2].rotation.x=ankle;
        L.joints[0].rotation.z=(L.root.position.x>0?-1:1)*F.splay*.4;
      });
      tail.joints[0].rotation.x=2.2+Math.sin(t*2.4)*.15+F.mv*.2;
      tail.joints[1].rotation.x=Math.sin(t*2.4-.7)*.25;
      tail.joints[2].rotation.x=Math.sin(t*2.4-1.4)*.3;
    }};
}

function spiderChassis(pal){
  const group=new THREE.Group();
  const body=new THREE.Group(); body.position.y=2.3; group.add(body);
  const thorax=ball(.9,pal.b,.1,4,8,6); thorax.scale.set(1.1,.8,1); body.add(thorax);
  const abdomen=ball(1.4,pal.a,.16,9,9,7); abdomen.scale.set(1,.95,1.25); abdomen.position.set(0,.35,-1.7); body.add(abdomen);
  const mark=ball(.6,pal.g,.08,2,7,5); mark.scale.set(.9,.5,1.1); mark.position.set(0,1.25,-1.7); body.add(mark);
  const socket=new THREE.Group(); socket.position.set(0,.25,.95); body.add(socket);
  const legs=[];
  for(let i=0;i<4;i++)for(let s=-1;s<=1;s+=2){
    const ang=s*(.45+i*.5);
    const L=chain([1.5,1.7,1],[.14,.11,.07],pal.b,i*19+s);
    L.root.position.set(Math.sin(ang)*.85,0,Math.cos(ang)*.85); L.root.rotation.y=ang;
    L.baseSplay=1.15; L.phase=(i%2===0?0:.5)+(s>0?.25:0); L.front=(i===0);
    body.add(L.root); legs.push(L);
  }
  const tassels=[];
  for(let i=0;i<4;i++){ const tc=chain([.7,.6],[.07,.04],pal.a,i*5+90);
    tc.root.position.set((i-1.5)*.4,-.5,-1.7); body.add(tc.root); tassels.push(tc); }
  return { group, body, socket, restY:2.3, headScale:.85, liftScale:1, strideScale:1,
    apply(ch,dt,t){
      const F=leggedView(ch);
      bodyPose(body,2.3,ch,t,this.liftScale);
      body.position.y+=Math.sin(t*2.8)*.05+F.mv*Math.sin(t*13)*.06;
      body.rotation.y+=F.yawWind;
      abdomen.rotation.x=Math.sin(t*1.9)*.06+F.mv*.1-F.crouch*.5;
      legs.forEach(L=>{
        const ph=t*(2.4+F.mv*9)*F.spdMul+L.phase*Math.PI*2;
        let splay=L.baseSplay+Math.sin(ph)*.06+F.mv*Math.sin(ph)*.2+F.splay*.3+F.crouch*.25;
        let swing=F.mv*Math.cos(ph)*.4;
        let knee=1.5+Math.sin(ph*1.1)*.08+F.mv*Math.max(0,Math.sin(ph))*.55+F.crouch*.8;
        if(L.front){ splay=lerp(splay,-.4+F.stabJab*1.3,F.stabRaise); knee=lerp(knee,2.4-F.stabJab*1.8,F.stabRaise); }
        else { splay=lerp(splay,1.6,F.thrust*.7); knee=lerp(knee,.8,F.thrust*.5); }
        L.root.rotation.x=swing;
        L.joints[0].rotation.z=-splay; L.joints[1].rotation.z=knee; L.joints[2].rotation.z=-.6;
      });
      tassels.forEach((tc,i)=>{ tc.joints[0].rotation.x=Math.sin(t*3+i*1.3)*.25*(1+F.mv); tc.joints[1].rotation.x=Math.sin(t*3.6+i)*.3; });
    }};
}

function serpentChassis(pal){
  const group=new THREE.Group();
  const body=new THREE.Group(); body.position.y=3; group.add(body);
  const socket=new THREE.Group(); socket.position.set(0,0,.5); body.add(socket);
  const segs=[]; let prev=body;
  for(let i=0;i<9;i++){
    const s=new THREE.Group(); s.position.z=(i===0? -0.7 : -(1.05-i*.04)); prev.add(s);
    const r=.85-i*.075;
    const m=ball(r,i%2?pal.a:pal.b,.08,i*7,8,6); m.scale.set(1,1,1.4); s.add(m);
    if(i%2===0&&i<7)for(let side=-1;side<=1;side+=2){
      const fin=box(1.1-i*.07,.06,.55,pal.c,.04,i+side*3);
      fin.position.set(side*(r+.45),0,0); fin.rotation.z=side*.35; s.add(fin);
    }
    segs.push(s); prev=s;
  }
  const tailFin=cone(.5,1.2,pal.g,4); tailFin.rotation.x=-Math.PI/2; tailFin.position.z=-.8; prev.add(tailFin);
  return { group, body, socket, restY:3, headScale:1.05, liftScale:1, strideScale:1,
    apply(ch,dt,t){
      const mv=ch.limbs.mv;
      // legged/tool/wing language on a serpent:
      const coil=clamp(ch.spine.coil+ch.limbs.crouch*.8+ch.tool.reach*.4,0,1);
      const ring=clamp(ch.spine.ring+ch.wings.spread*.5,0,1);
      const jabZ=(ch.limbs.stabJab+ch.tool.grip*.6)*1.2;
      bodyPose(body,3,ch,t,this.liftScale);
      body.position.y+=-ch.limbs.crouch*.5+Math.sin(t*1.3)*.25+mv*.5+ch.wings.beat*Math.sin(t*15)*.15;
      body.position.z=jabZ;
      body.rotation.z+=Math.sin(t*.9)*.06;
      const waveAmp=(.12+mv*.3+ch.limbs.stabRaise*.1)*(1-ring*.7);
      const waveSpd=(2+mv*4)*ch.spine.spdMul*ch.limbs.spdMul;
      segs.forEach((s,i)=>{
        const ph=t*waveSpd-i*.7;
        s.rotation.y=Math.sin(ph)*waveAmp + coil*Math.sin(i*.9)*.55 + ring*.62;
        s.rotation.x=Math.sin(ph*.7+i)*.04+ring*.03;
        s.rotation.z=Math.sin(ph+i)*.05;
      });
    }};
}

function grabberChassis(pal){
  const group=new THREE.Group();
  const body=new THREE.Group(); body.position.y=2.6; group.add(body);
  const hull=ball(1.5,pal.b,.14,3,9,7); hull.scale.set(1,.8,1.35); body.add(hull);
  const plates=ball(1.2,pal.a,.18,8,7,5); plates.scale.set(1.1,.55,1.2); plates.position.y=.55; body.add(plates);
  const socket=new THREE.Group(); socket.position.set(0,.35,1.55); body.add(socket);
  const arms=[];
  for(let i=0;i<6;i++){
    const ang=(i/6)*Math.PI*2+Math.PI/6;
    const a=chain([1.7,1.5,1.2],[.24,.2,.14],pal.a,i*31);
    a.root.position.set(Math.sin(ang)*1.15,-.2,Math.cos(ang)*1.15);
    a.root.rotation.y=ang;
    a.baseSplay=.85; a.phase=(i%2)*.5+i*.13; a.front=(i===0||i===5);
    const claw=cone(.16,.5,pal.c,4); claw.rotation.x=Math.PI; a.tip.add(claw);
    body.add(a.root); arms.push(a);
  }
  return { group, body, socket, restY:2.6, headScale:.9, liftScale:1, strideScale:1,
    apply(ch,dt,t){
      const F=leggedView(ch);
      bodyPose(body,2.6,ch,t,this.liftScale);

  function wing(side){

    const arm=box(1.6,.3,.5,pal.b,.06,side*3+30); arm.position.x=side*.8; sh.add(arm);

      f.position.set(side*(1.9-i*.12)/2,0,0); piv.add(f);
      piv.rotation.y=side*(-.15-i*.14);
      feathers.push({piv,base:side*(-.15-i*.14),i});
    }
    return {sh,fo,feathers,side};
  }
  const wings=[wing(1),wing(-1)];
  const legs=[];
  for(let s=-1;s<=1;s+=2){
    const L=chain([.9,.9],[.2,.15],pal.d,s*61);
    L.root.position.set(s*.5,-1.2,.1);
    for(let i=0;i<3;i++){ const c=cone(.08,.5,pal.d,4); c.rotation.x=Math.PI-((i-1)*.4); c.position.set((i-1)*.16,.1,.12); L.tip.add(c); }
    body.add(L.root); legs.push(L);
  }
  const plumes=[];
  for(let i=0;i<3;i++){ const piv=new THREE.Group(); piv.position.set(0,.4,-.9); piv.rotation.x=.5; piv.rotation.y=(i-1)*.3;
    const p=box(.22,.06,2.2,i===1?pal.g:pal.c,.05,i*11+70); p.position.z=-1.1; piv.add(p); body.add(piv); plumes.push(piv); }

      body.rotation.x+=mv*.18;
      body.rotation.y+=F.yawWind;
      const spread=ch.wings.spread, beat=ch.wings.beat;
      // thrust = wing snap burst

      let foreW=-.35-flap*(.15+mv*.35);
      shoulder=lerp(shoulder,.75,spread); foreW=lerp(foreW,.25,spread);
      shoulder-=F.crouch*.35; // mantle when crouching
      wings.forEach(w=>{
        w.sh.rotation.z=w.side*shoulder;
        w.fo.rotation.z=w.side*foreW;
        w.feathers.forEach(f=>{ f.piv.rotation.y=f.base*(1+spread*.9)-w.side*spread*.12*f.i; });
      });
      legs.forEach((L,i)=>{
        let hip=.3+mv*.5+Math.sin(t*2+i)*.05, knee=.4+mv*.6;

        L.joints[0].rotation.x=hip; L.joints[1].rotation.x=knee;
      });
      plumes.forEach((p,i)=>{ p.rotation.x=.5+Math.sin(t*2+i)*.08+mv*.25+spread*.6; p.rotation.y=(i-1)*(.3+spread*.5); });
    }};
}

  STILT_SCAN:{label:'CROUCH SCAN',src:'STILT WALKER',dur:2.2,drive(ch,u,t){
    const p=asr(u,.3,.7);
    const c=p.s>0?(p.r>0?1-ez(p.r):1):ezo(p.a);
    ch.limbs.crouch=c;
    ch.head.yaw=Math.sin(u*14)*.9*c;
    ch.body.pitch=c*.06;
    ch.fx.flare=c*.5;
  }},
  ANT_CHARGE:{label:'CHARGE',src:'SCREAMING ANTELOPE',dur:1.5,drive(ch,u,t){
    const p=asr(u,.28,.68);
    ch.body.pitch=ezo(p.a)*.18*(1-p.s);
    ch.root.z=lerp(0,5.5,ezi(clamp((p.s)*1.2,0,1)))*(1-ez(p.r));
    ch.head.pitch=(p.s>0? -.6*ezo(clamp(p.s*2,0,1)):0)*(1-p.r);
    ch.jaw.open=.3*(p.s>0?1:0)*(1-p.r);
    ch.limbs.mv=Math.max(ch.limbs.mv,(p.s>0&&p.r<=0)?1:0);
    ch.limbs.spdMul=1+(p.s>0&&p.r<=0?2.2:0);
    if(p.s>.85&&p.s<.95) shake(.4);
  }},
  ANT_SCREAM:{label:'SCREAM',src:'SCREAMING ANTELOPE',dur:1.9,drive(ch,u,t){
    const p=asr(u,.3,.75);
    const c=p.s>0?(p.r>0?1-ez(p.r):1):ezo(p.a);
    ch.body.pitch=-c*.5; ch.body.lift=c*.7;
    ch.head.pitch=-c*.45; ch.jaw.open=1.2*c;
    ch.head.shiver=(p.s>0? .09:0)*(1-p.r);
    ch.limbs.stabRaise=c*.6;
    ch.fx.flare=c*.7;
    if(p.s>.05&&p.s<.15) shake(.25);
  }},
  PHX_DIVE:{label:'TALON DIVE',src:'PHOENIX',dur:1.6,drive(ch,u,t){
    const p=asr(u,.35,.6);
    ch.body.lift=ezo(p.a)*2.4*(1-(p.s>0?1:0))+(p.s>0? lerp(2.4,-1,ezi(p.s)):0)*(1-(p.r>0?ez(p.r):0));
    ch.body.pitch=ezo(p.a)*.5*(1-p.r)*(p.s>0?1-p.s*.5:1);
    ch.limbs.stabRaise=clamp(p.a*1.2,0,1)*(p.r>0?1-ez(p.r):1);
    ch.limbs.stabJab=(p.s>0? ezi(p.s):0)*(p.r>0?1-ez(p.r):1);
    ch.wings.spread=ezo(p.a)*.6*(p.s>0?1-p.s:1)+(p.r>0? ez(p.r)*.3:0);
    ch.wings.beat=(p.r>0? (1-p.r)*1:0);
    ch.root.z=(p.s>0? ezo(p.s)*1.6:0)*(1-ez(p.r));
    if(p.s>=1&&p.r<.08) shake(.45);
  }},
  PHX_FLARE:{label:'WING FLARE',src:'PHOENIX',dur:2.4,drive(ch,u,t){
    const p=asr(u,.45,.8);
    const c=p.s>0?(p.r>0?1-ez(p.r):1):ez(p.a);
    ch.wings.spread=c; ch.body.lift=c*.5; ch.fx.flare=c*.7;
    ch.head.pitch=-c*.2;
    if(p.a>.9&&p.s<.1&&p.r<=0) shake(.1);
  }},
  CROC_SNAP:{label:'SNAP BITE',src:'CRIMSON CROC',dur:1.5,drive(ch,u,t){
    const p=asr(u,.5,.58);
    ch.jaw.open=lerp(0,.95,ez(p.a))*(p.s>0?1-ezi(p.s):1)+(p.r>0? .06*ez(p.r):0);
    ch.head.pitch=-ez(p.a)*.15*(1-p.s)+(p.s>0? .18*ezo(p.s):0)*(1-p.r);
    ch.root.z=(p.s>0? ezo(p.s)*1.4:0)*(1-ez(p.r));
    if(p.s>=1&&p.r<.06) shake(.35);
  }},
  CROC_ROLL:{label:'DEATH ROLL',src:'CRIMSON CROC',dur:1.9,drive(ch,u,t){
    const p=asr(u,.22,.82);
    const c=p.s>0?(p.r>0?1-ez(p.r):1):ezo(p.a);
    ch.jaw.open=.7*ezo(p.a)*(1-ez(p.r));
    ch.body.roll=(p.s>0? ez(p.s):0)*Math.PI*4;   // ends at 4π ≡ upright
    ch.body.lift=(p.s>0? Math.sin(clamp(p.s,0,1)*Math.PI)*.3:0);
    ch.limbs.crouch=c;
    if(p.s>.05&&p.s<.15) shake(.3);
    if(p.s>.5&&p.s<.55) shake(.2);
  }},
};

/* ============================================================
   CREATURE DEFS — pal is the head's palette, applied to any
   chassis it rides. Hybrid name = HEAD.pre + '-' + BODY.post
   ============================================================ */
const DEFS=[
  {id:'lion',chip:'LIO',name:'LION GOD',       pre:'LION',  post:'GOD',    moveLabel:'PROWL',   speed:6,  camY:2.6,camD:16, chassis:lionChassis,    headBuild:lionHead,    anims:['LION_POUNCE','LION_ROAR'],   pal:{a:0xc9a25a,b:0xb8905a,c:0xe8c25c,d:0x4a3020,g:0xffc93c}},
  {id:'spid',chip:'SPI',name:'SPIDICULES',     pre:'SPIDI', post:'CULES',  moveLabel:'SKITTER', speed:7,  camY:2.2,camD:15, chassis:spiderChassis,  headBuild:spiderHead,  anims:['SPID_STAB','SPID_SPIN'],     pal:{a:0x453a54,b:0x2e2838,c:0xd8c2a0,d:0x1e1a2a,g:0xff5a3c}},
  {id:'sun', chip:'SUN',name:'SUNSTALKER',     pre:'SUN',   post:'STALKER',moveLabel:'GLIDE',   speed:5.5,camY:3,  camD:18, chassis:serpentChassis, headBuild:sunHead,     anims:['SUN_DART','SUN_FLARE'],      pal:{a:0x352c48,b:0x2a2436,c:0xffc93c,d:0x1e1a2a,g:0xff5a3c}},
  {id:'grab',chip:'GRB',name:'GRABBER',        pre:'GRAB',  post:'GRASP',  moveLabel:'SCUTTLE', speed:6.5,camY:2.4,camD:15, chassis:grabberChassis, headBuild:grabberHead, anims:['GRAB_SNATCH','GRAB_POUNCE'], pal:{a:0x5c4a72,b:0x4a3d5c,c:0xd8c2a0,d:0x3a3048,g:0xc88aff}},
  {id:'tooth',chip:'TTH',name:'TOOTHY MECH',   pre:'TOOTH', post:'MAW',    moveLabel:'HEAVY TROT',speed:5,camY:2.2,camD:15, chassis:toothyChassis,  headBuild:toothyHead,  anims:['TOOTHY_CHOMP','TOOTHY_THRASH'],pal:{a:0x8a3a2e,b:0x5a4a58,c:0xd8c2a0,d:0x3a3040,g:0xff7a2a}},
  {id:'mc',  chip:'MOC',name:'MOTHER COURAGE', pre:'MOTHER',post:'COURAGE',moveLabel:'TRUNDLE', speed:2.2,camY:3.2,camD:19, chassis:courageChassis, headBuild:courageHead, anims:['MC_HARVEST','MC_SHUDDER'],   pal:{a:0x6a705c,b:0x525a48,c:0x8a8a72,d:0x3a4034,g:0x9fd45c}},
  {id:'stilt',chip:'STL',name:'STILT WALKER',  pre:'STILT', post:'WALKER', moveLabel:'STRIDE',  speed:3.4,camY:4.6,camD:24, chassis:stiltChassis,   headBuild:stiltHead,   anims:['STILT_STOMP','STILT_SCAN'],  pal:{a:0x4a5568,b:0x39424f,c:0x5a687e,d:0x2a3038,g:0x6fd8ff}},
  {id:'ant', chip:'ANT',name:'SCREAMING ANTELOPE',pre:'SCREAM',post:'PRONG',moveLabel:'GALLOP', speed:8.5,camY:2,  camD:13, chassis:antelopeChassis,headBuild:antelopeHead,anims:['ANT_CHARGE','ANT_SCREAM'],   pal:{a:0xb8a284,b:0xa08a6c,c:0xe8dcc4,d:0x6e5a44,g:0xff8a5c}},
  {id:'phx', chip:'PHX',name:'PHOENIX',        pre:'PYRE',  post:'WING',   moveLabel:'ASCEND',  speed:4,  camY:3.4,camD:19, chassis:phoenixChassis, headBuild:phoenixHead, anims:['PHX_DIVE','PHX_FLARE'],      pal:{a:0xd8b04a,b:0xc89838,c:0xf2d98a,d:0xb85c2e,g:0xff5a3c}},
  {id:'croc',chip:'CRC',name:'CRIMSON CROCODILE',pre:'CROC',post:'JAWS',   moveLabel:'SPRAWL',  speed:4,  camY:1.6,camD:15, chassis:crocChassis,    headBuild:crocHead,    anims:['CROC_SNAP','CROC_ROLL'],     pal:{a:0x9e2b2b,b:0x8a2424,c:0xe8d8a8,d:0x6e1e1e,g:0xff4a2a}},
];

function assemble(bodyDef,headDef){
  const chassis=bodyDef.chassis(headDef.pal);   // <- body wears the head's colors
  const head=headDef.headBuild();
  head.group.scale.setScalar(chassis.headScale/head.nominal);
  chassis.socket.add(head.group);
  const seen={},animKeys=[];
  bodyDef.anims.concat(headDef.anims).forEach(k=>{ if(!seen[k]){seen[k]=1;animKeys.push(k);} });
  return {group:chassis.group, chassis, head, animKeys, bodyDef, headDef};
}

/* ============================================================
   STATE / UI / GAMEPAD / LOOP
   ============================================================ */
const S={mode:'idle', timer:0, dur:0, moveBlend:0, anim:null};
function setIdle(){ S.mode='idle'; S.anim=null; syncButtons(); }
function toggleMove(){ S.mode=(S.mode==='move')?'idle':'move'; S.anim=null; syncButtons(); }
function fire(key){ const a=ANIMS[key]; S.mode='attack'; S.anim=a; S.timer=0; S.dur=a.dur; syncButtons(); }

let bodyIdx=0, headIdx=0, rig=null;
const N=DEFS.length;
const nameEl=document.getElementById('mname'), tagEl=document.getElementById('mtag'), serialEl=document.getElementById('serial');
const animsEl=document.getElementById('anims');

function buildChips(){
  [['bodyChips',i=>{bodyIdx=i;spawn();}],['headChips',i=>{headIdx=i;spawn();}]].forEach(([elId,set])=>{
    const holder=document.getElementById(elId); holder.innerHTML='';
    DEFS.forEach((d,i)=>{ const c=document.createElement('button'); c.className='chip'; c.textContent=d.chip;
      c.addEventListener('click',()=>set(i)); holder.appendChild(c); });
  });
}
function syncChips(){
  [['bodyChips',bodyIdx],['headChips',headIdx]].forEach(([elId,on])=>{
    [...document.getElementById(elId).children].forEach((c,i)=>c.classList.toggle('on',i===on));
  });
}
function buildButtons(){
  animsEl.innerHTML='';
  const mk=(label,sub,fn,id)=>{ const b=document.createElement('button'); b.className='abtn'; b.dataset.id=id;
    b.innerHTML=label+(sub?'<span class="src">'+sub+'</span>':'');
    b.addEventListener('click',fn); animsEl.appendChild(b); };
  mk('IDLE','',setIdle,'idle');
  mk(rig.bodyDef.moveLabel,rig.bodyDef.chip,toggleMove,'move');
  rig.animKeys.forEach(k=>{ const a=ANIMS[k]; mk(a.label,a.src,()=>fire(k),k); });
}
function syncButtons(){
  document.querySelectorAll('.abtn').forEach(b=>{
    const id=b.dataset.id;
    b.classList.toggle('on',(id===S.mode)||(S.anim&&ANIMS[id]===S.anim));
  });
}
function spawn(){
  if(rig) scene.remove(rig.group);
  const bd=DEFS[bodyIdx], hd=DEFS[headIdx];
  rig=assemble(bd,hd);
  scene.add(rig.group);
  const pure=(bd===hd);
  nameEl.textContent=pure? bd.name : hd.pre+'-'+bd.post;
  tagEl.textContent=pure? 'pure strain' : hd.name+' head · '+bd.name+' body';
  serialEl.textContent='FUSION '+(bodyIdx+1)+'\u00b7'+(headIdx+1);
  cam.tDist=bd.camD; cam.focusY=bd.camY;
  S.mode='idle'; S.anim=null; S.moveBlend=0;
  buildButtons(); syncButtons(); syncChips();
}

addEventListener('keydown',e=>{
  if(e.key==='q'){bodyIdx=(bodyIdx+N-1)%N;spawn();}
  if(e.key==='e'){bodyIdx=(bodyIdx+1)%N;spawn();}
  if(e.key==='a'){headIdx=(headIdx+N-1)%N;spawn();}
  if(e.key==='d'){headIdx=(headIdx+1)%N;spawn();}
  if(e.key==='1')setIdle();
  if(e.key==='2')toggleMove();
  const n=parseInt(e.key,10);
  if(n>=3&&n<=6&&rig.animKeys[n-3])fire(rig.animKeys[n-3]);
});

const padPrev={};
const padDot=document.getElementById('padDot');
function pollPad(dt){
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  let pad=null; for(const p of pads) if(p&&p.connected){pad=p;break;}
  padDot.classList.toggle('live',!!pad);
  if(!pad) return;
  const press=i=>{const now=pad.buttons[i]&&pad.buttons[i].pressed;const was=padPrev[i];padPrev[i]=now;return now&&!was;};
  if(press(4)){bodyIdx=(bodyIdx+N-1)%N;spawn();}
  if(press(5)){bodyIdx=(bodyIdx+1)%N;spawn();}
  if(press(12)){headIdx=(headIdx+N-1)%N;spawn();}
  if(press(13)){headIdx=(headIdx+1)%N;spawn();}
  if(press(0))toggleMove();
  if(press(1))setIdle();
  if(press(2)&&rig.animKeys[0])fire(rig.animKeys[0]);
  if(press(3)&&rig.animKeys[1])fire(rig.animKeys[1]);
  if(press(6)&&rig.animKeys[2])fire(rig.animKeys[2]);
  if(press(7)&&rig.animKeys[3])fire(rig.animKeys[3]);
  const rx=pad.axes[2]||0, ry=pad.axes[3]||0;
  if(Math.abs(rx)>.15)cam.tYaw-=rx*dt*2.2;
  if(Math.abs(ry)>.15)cam.tPitch=clamp(cam.tPitch+ry*dt*1.6,.08,1.15);
}

const cam={yaw:.65,pitch:.42,dist:16,tYaw:.65,tPitch:.42,tDist:16,focusY:2.6};
let dragging=false,lx=0,ly=0,pinch0=0,dist0=0;
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;});
addEventListener('pointerup',()=>dragging=false);
addEventListener('pointermove',e=>{ if(!dragging)return;
  cam.tYaw-=(e.clientX-lx)*.006; cam.tPitch=clamp(cam.tPitch+(e.clientY-ly)*.004,.08,1.15);
  lx=e.clientX;ly=e.clientY; });
el.addEventListener('touchstart',e=>{ if(e.touches.length===2){
  pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);dist0=cam.tDist;}},{passive:true});
el.addEventListener('touchmove',e=>{ if(e.touches.length===2){
  const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  cam.tDist=clamp(dist0*pinch0/d,6,44);dragging=false;}},{passive:true});
el.addEventListener('wheel',e=>{cam.tDist=clamp(cam.tDist+e.deltaY*.02,6,44);},{passive:true});

const clock=new THREE.Clock();
buildChips(); spawn();
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  const t=clock.elapsedTime;
  pollPad(dt);

  const ch=CH();
  S.moveBlend=lerp(S.moveBlend, S.mode==='move'?1:0, 1-Math.pow(.002,dt));
  ch.limbs.mv=S.moveBlend;

  let u=0;
  if(S.mode==='attack'&&S.anim){
    S.timer+=dt; u=clamp(S.timer/S.dur,0,1);
    S.anim.drive(ch,u,t);
    if(S.timer>=S.dur) setIdle();
  }

  if(rig){
    rig.group.position.z=lerp(rig.group.position.z,ch.root.z*rig.chassis.strideScale,1-Math.pow(1e-12,dt));
    rig.group.rotation.y=ch.root.spin;
    rig.chassis.socket.rotation.x=ch.head.pitch+Math.sin(t*1.4)*.04;
    rig.chassis.socket.rotation.y=ch.head.yaw+Math.sin(t*.6)*.15*(1-S.moveBlend);
    rig.chassis.socket.rotation.z=ch.head.roll+Math.sin(t*29)*ch.head.shiver;
    rig.chassis.apply(ch,dt,t);
    rig.head.apply(ch,t);
    groundTex.offset.y-=rig.bodyDef.speed*S.moveBlend*dt*(24/200);
  }

  cam.yaw=lerp(cam.yaw,cam.tYaw,1-Math.pow(.001,dt));
  cam.pitch=lerp(cam.pitch,cam.tPitch,1-Math.pow(.001,dt));
  cam.dist=lerp(cam.dist,cam.tDist,1-Math.pow(.001,dt));
  trauma=Math.max(0,trauma-dt*1.6);
  const sh=trauma*trauma;
  const sx=(hash(t*57.3)-.5)*sh*.7, sy=(hash(t*91.7+3)-.5)*sh*.7;
  camera.position.set(
    Math.sin(cam.yaw)*Math.cos(cam.pitch)*cam.dist+sx,
    cam.focusY+Math.sin(cam.pitch)*cam.dist+sy,
    Math.cos(cam.yaw)*Math.cos(cam.pitch)*cam.dist);
  camera.lookAt(sx,cam.focusY+sy,0);
  camera.rotation.z+=(hash(t*77.1+9)-.5)*sh*.15;
  renderer.render(scene,camera);
}
loop();
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
